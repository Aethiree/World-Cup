<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
:root{
  --paper:#FBFAF7;--panel:#fff;--ink:#16182B;--soft:#5A5E72;--hair:#E7E4DB;
  --can:#D8112B;--mex:#1B7A4B;--usa:#27468C;--gold:#B8923A;--livec:#E03A2F;
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--ink);background:#0e0f1a;-webkit-font-smoothing:antialiased;}
.wrap{max-width:880px;margin:0 auto;background:var(--paper);min-height:100vh;min-height:100dvh;}
.display{font-family:'Anton',sans-serif;text-transform:uppercase;}
.mono{font-family:'IBM Plex Mono',monospace;}

/* header */
.hd{position:sticky;top:0;z-index:30;background:var(--ink);color:var(--paper);padding:calc(14px + env(safe-area-inset-top)) 18px 0;}
.hd-top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
.wordmark{font-family:'Anton';font-size:28px;line-height:.9;text-transform:uppercase;letter-spacing:.01em;margin:0;}
.wordmark .yr{-webkit-text-stroke:1.5px var(--paper);color:var(--ink);}
.hd-sub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#b9bccd;margin-top:5px;}
.statusbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;justify-content:flex-end;}
.pill{display:inline-flex;align-items:center;gap:7px;font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);color:#d9dbe7;}
.pill.live{background:rgba(224,58,47,.16);color:#ff9a90;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--livec);animation:pulse 1.4s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(224,58,47,.6);}70%{box-shadow:0 0 0 7px rgba(224,58,47,0);}100%{box-shadow:0 0 0 0 rgba(224,58,47,0);}}
.refresh{display:inline-flex;align-items:center;gap:6px;background:var(--paper);color:var(--ink);border:none;font-family:'Inter';font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;padding:7px 12px;border-radius:999px;cursor:pointer;}
.refresh:disabled{opacity:.6;}
.spin{animation:spin 1s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}
.triband{display:flex;height:4px;margin-top:11px;}
.triband i{flex:1;display:block;}
.b-can{background:var(--can);}.b-mex{background:var(--mex);}.b-usa{background:var(--usa);}
.tabs{display:flex;gap:2px;overflow-x:auto;padding:12px 12px 0;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;border:none;background:transparent;cursor:pointer;font-family:'Inter';font-size:12px;font-weight:600;letter-spacing:.02em;color:#9da0b4;padding:10px 13px;border-bottom:2.5px solid transparent;white-space:nowrap;text-transform:uppercase;}
.tab.on{color:var(--paper);border-color:var(--gold);}
.tab .ct{font-family:'IBM Plex Mono';font-size:10px;background:rgba(255,255,255,.1);color:#cfd2e0;padding:1px 6px;border-radius:999px;}

/* body */
.body{padding:18px 16px calc(48px + env(safe-area-inset-bottom));}
.note{font-size:11.5px;color:var(--soft);background:#fff;border:1px solid var(--hair);border-left:3px solid var(--gold);padding:9px 12px;border-radius:3px;margin-bottom:16px;line-height:1.45;}
.note.warn{border-left-color:var(--livec);}
.dayhd{font-family:'IBM Plex Mono';font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--soft);margin:18px 2px 8px;display:flex;align-items:center;gap:9px;}
.dayhd::after{content:"";flex:1;height:1px;background:var(--hair);}
.tbadge{font-family:'Inter';font-size:9px;font-weight:700;letter-spacing:.08em;color:#fff;background:var(--livec);padding:2px 7px;border-radius:999px;}
.tbadge.tmr{background:var(--soft);}
.jump{display:flex;align-items:center;gap:8px;background:rgba(224,58,47,.1);border:1px solid #f3b3ad;color:var(--livec);font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:10px 13px;border-radius:7px;margin-bottom:14px;cursor:pointer;}
.jump .dot{background:var(--livec);}
.hero{background:var(--ink);color:var(--paper);border-radius:8px;padding:14px 16px;margin-bottom:16px;}
.hero .lab{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#b9bccd;margin-bottom:8px;}
.hero .ht{font-family:'Anton';font-size:18px;text-transform:uppercase;line-height:1.05;}
.hero .hmeta{font-size:11.5px;color:#cfd2e0;margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;}
.hero .cd{font-family:'IBM Plex Mono';font-weight:600;color:var(--gold);}
@keyframes flash{0%{background:#FFF1CF;}100%{background:var(--panel);}}
.card.flash{animation:flash 1.6s ease;}
.pinhd{font-family:'Anton';font-size:15px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink);display:flex;align-items:center;gap:8px;margin:4px 2px 8px;}
.pinhd .s{color:var(--gold);}
.followbar{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin:2px 0 14px;}
.fchip{display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:var(--paper);font-size:12px;font-weight:600;padding:6px 8px 6px 11px;border-radius:999px;}
.fchip button{background:rgba(255,255,255,.18);border:none;color:#fff;width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;}
.clearall{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--soft);background:none;border:none;cursor:pointer;text-decoration:underline;}
.gtitle{font-family:'IBM Plex Mono';font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--soft);margin:16px 2px 6px;}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.teamrow{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--hair);border-radius:7px;padding:9px 11px;cursor:pointer;font-size:13px;font-weight:500;}
.teamrow.onf{border-color:var(--gold);background:#FFFBF0;}
.teamrow .sbtn{width:18px;height:18px;flex:0 0 auto;color:var(--hair);}
.teamrow.onf .sbtn{color:var(--gold);}
.teamrow .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tag.foll{color:var(--gold);border-color:var(--gold);}
@media(max-width:560px){.tgrid{grid-template-columns:1fr;}}
/* bracket org chart */
.bkwrap{overflow:auto;-webkit-overflow-scrolling:touch;padding:6px 2px 16px;border:1px solid var(--hair);border-radius:8px;background:#fcfbf8;}
.bracket{display:flex;width:max-content;padding:6px;}
.bk-node{display:flex;align-items:center;}
.bk-children{display:flex;flex-direction:column;justify-content:center;}
.bk-child{display:flex;}
.bk-conn{width:14px;flex:0 0 auto;border-top:2px solid #d9d5c8;}
.bk-match{flex:0 0 auto;width:150px;background:#fff;border:1px solid var(--hair);border-radius:6px;padding:6px 8px;margin:6px 0;cursor:pointer;}
.bk-match.bklive{border-color:#f3b3ad;box-shadow:0 0 0 1px #f3b3ad inset;}
.bk-match.bkfinal{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;}
.bk-tag{font-family:'IBM Plex Mono';font-size:8px;color:var(--soft);letter-spacing:.06em;margin-bottom:3px;text-transform:uppercase;}
.bk-team{display:flex;justify-content:space-between;gap:6px;padding:2px 0;font-size:11px;color:var(--ink);}
.bk-team.bw{font-weight:700;}
.bk-team.tbd .nm{color:var(--soft);font-style:italic;}
.bk-team .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bk-sc{font-family:'IBM Plex Mono';font-weight:600;color:var(--soft);flex:0 0 auto;}
.bk-live{color:var(--livec);font-size:8px;font-weight:700;margin-top:2px;letter-spacing:.05em;}
.bk3{margin-top:16px;background:#fff;border:1px solid var(--hair);border-radius:8px;padding:12px;}
.bk3 .bk3lab{font-family:'Anton';font-size:14px;text-transform:uppercase;margin-bottom:8px;color:var(--ink);}
.bk3 .bk-match{width:auto;margin:0;}
.bkscale{font-size:10.5px;color:var(--soft);margin:8px 2px 0;}
/* knockout editor */
.koin{display:flex;flex-direction:column;gap:9px;margin-bottom:8px;}
.koin input{font-family:'Inter';font-size:14px;padding:11px 12px;border:1px solid var(--hair);border-radius:8px;background:#fff;}
.koin .vsx{font-family:'Anton';color:var(--soft);font-size:13px;text-align:center;}
.advsel{display:flex;gap:8px;margin:4px 0 16px;}
.advsel button{flex:1;border:1px solid var(--hair);background:#fff;border-radius:8px;padding:11px 8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--soft);font-family:'Inter';}
.advsel button.on{background:var(--mex);color:#fff;border-color:var(--mex);}
.advlbl{font-size:11px;color:var(--soft);margin-bottom:7px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;}
.sechd{font-family:'Anton';font-size:18px;text-transform:uppercase;color:var(--ink);margin:22px 0 6px;}
.card{position:relative;background:var(--panel);border:1px solid var(--hair);border-radius:6px;padding:11px 14px 11px 18px;margin-bottom:8px;overflow:hidden;}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--usa);}
.card.can::before{background:var(--can);}.card.mex::before{background:var(--mex);}.card.usa::before{background:var(--usa);}.card.ko::before{background:var(--gold);}
.card.islive{border-color:#f3b3ad;box-shadow:0 0 0 1px #f3b3ad inset;}
.card.editable{cursor:pointer;}
.card.editable:active{transform:scale(.997);}
.crow{display:grid;grid-template-columns:62px 1fr auto;gap:12px;align-items:center;}
.ctime{font-family:'IBM Plex Mono';font-size:12px;font-weight:600;color:var(--ink);line-height:1.2;}
.ctime small{display:block;font-size:9px;color:var(--soft);font-weight:500;}
.teams{font-size:14.5px;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.teams .t{color:var(--ink);} .teams .t.win{font-weight:700;} .teams .vs{color:var(--soft);}
.sc{font-family:'IBM Plex Mono';font-size:13px;font-weight:600;background:var(--ink);color:#fff;padding:1px 8px;border-radius:3px;letter-spacing:.06em;}
.sc.livesc{background:var(--livec);}
.meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:5px;}
.tag{font-family:'IBM Plex Mono';font-size:9.5px;font-weight:600;color:var(--soft);border:1px solid var(--hair);padding:1px 5px;border-radius:3px;letter-spacing:.04em;}
.tag.star{color:var(--gold);border-color:var(--gold);}
.tag.man{color:var(--mex);border-color:var(--mex);}
.loc{font-size:11px;color:var(--soft);display:inline-flex;align-items:center;gap:3px;}
.loc b{color:var(--ink);font-weight:600;}
.badge{justify-self:end;text-align:right;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.badge .ft{color:var(--soft);} .badge .up{color:var(--soft);font-family:'IBM Plex Mono';font-weight:600;font-size:10.5px;}
.badge .lv{color:var(--livec);display:inline-flex;align-items:center;gap:5px;justify-content:flex-end;}
.badge .upr{display:block;color:var(--gold);font-size:9.5px;margin-top:2px;}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.filters select,.filters input{font-family:'Inter';font-size:12.5px;color:var(--ink);background:#fff;border:1px solid var(--hair);border-radius:5px;padding:7px 10px;}
.filters input{flex:1;min-width:120px;}
.chip{font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;border:1px solid var(--hair);background:#fff;color:var(--soft);padding:6px 11px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.chip.canon.on{background:var(--can);border-color:var(--can);}
.chip .cdot{width:8px;height:8px;border-radius:50%;background:var(--can);}
.stable{background:#fff;border:1px solid var(--hair);border-radius:6px;overflow:hidden;margin-bottom:14px;}
.stable h4{font-family:'Anton';font-size:14px;text-transform:uppercase;margin:0;padding:9px 12px;background:var(--ink);color:var(--paper);letter-spacing:.04em;}
.st-row{display:grid;grid-template-columns:18px 1fr 26px 30px 28px 34px;gap:6px;align-items:center;padding:7px 12px;border-top:1px solid var(--hair);font-size:12.5px;}
.st-row.hdr{font-family:'IBM Plex Mono';font-size:9px;color:var(--soft);text-transform:uppercase;border-top:none;}
.st-row .pos{font-family:'IBM Plex Mono';font-weight:600;color:var(--soft);font-size:11px;}
.st-row.adv{background:rgba(27,122,75,.06);} .st-row.adv .pos{color:var(--mex);}
.st-row.third{background:rgba(184,146,58,.07);}
.st-row .nm{font-weight:600;} .st-row .num{font-family:'IBM Plex Mono';text-align:center;color:var(--soft);}
.st-row .pts{font-family:'IBM Plex Mono';text-align:center;font-weight:700;color:var(--ink);}
.st-hd{text-align:center;}
.emptyg{font-size:11.5px;color:var(--soft);padding:10px 12px;}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:10.5px;color:var(--soft);margin:0 2px 14px;}
.legend .k{display:inline-flex;align-items:center;gap:6px;font-weight:600;text-transform:uppercase;}
.legend .d{width:10px;height:10px;border-radius:2px;display:inline-block;}
.empty{text-align:center;color:var(--soft);font-size:13px;padding:36px 10px;}
.foot{font-size:10.5px;color:var(--soft);text-align:center;padding:18px 10px 0;line-height:1.5;}

/* install button */
#install{display:none;}
.installbar{margin:0 0 14px;background:var(--ink);color:var(--paper);border-radius:6px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12.5px;}
.installbar button{background:var(--gold);color:#1c1500;border:none;font-weight:700;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;padding:8px 14px;border-radius:5px;cursor:pointer;}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(14,15,26,.55);display:none;align-items:flex-end;justify-content:center;z-index:60;}
.overlay.show{display:flex;}
.sheet{width:100%;max-width:460px;background:var(--paper);border-radius:14px 14px 0 0;padding:20px 20px calc(22px + env(safe-area-inset-bottom));animation:rise .2s ease;}
@keyframes rise{from{transform:translateY(20px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
.sheet h3{font-family:'Anton';font-size:16px;text-transform:uppercase;margin:0 0 2px;}
.sheet .sub{font-size:11.5px;color:var(--soft);margin-bottom:16px;}
.scorer{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:18px;}
.scorer .side{text-align:center;}
.scorer .side .nm{font-size:13px;font-weight:600;margin-bottom:8px;min-height:32px;display:flex;align-items:center;justify-content:center;}
.stepper{display:flex;align-items:center;justify-content:center;gap:10px;}
.stepper button{width:34px;height:34px;border-radius:8px;border:1px solid var(--hair);background:#fff;font-size:18px;font-weight:700;color:var(--ink);cursor:pointer;line-height:1;}
.stepper .val{font-family:'IBM Plex Mono';font-size:24px;font-weight:600;min-width:30px;text-align:center;}
.scorer .x{font-family:'Anton';color:var(--soft);font-size:18px;}
.sheet-actions{display:flex;gap:8px;}
.sheet-actions button{flex:1;border:none;border-radius:7px;padding:12px;font-family:'Inter';font-weight:600;font-size:12.5px;letter-spacing:.03em;text-transform:uppercase;cursor:pointer;}
.btn-save{background:var(--ink);color:var(--paper);} .btn-clear{background:#fff;color:var(--soft);border:1px solid var(--hair)!important;} .btn-cancel{background:#fff;color:var(--soft);border:1px solid var(--hair)!important;}
@media(max-width:560px){.crow{grid-template-columns:54px 1fr;}.badge{grid-column:2;justify-self:start;text-align:left;margin-top:4px;}.badge .lv,.badge .upr{justify-content:flex-start;}}
</style>
</head>

</div>

<div class="overlay" id="overlay">

function seedKnockout(){
  let applied=0;try{applied=+localStorage.getItem("wc26_koseedv")||0;}catch(e){}
  const force=applied<KO_SEED_VERSION;
  for(const code in KO_SEED){
    const s=KO_SEED[code];
    if(force||!koOverride[code])koOverride[code]={h:s.h,a:s.a};
    if(s.win&&(force||!koWin[code]))koWin[code]=s.win;

}

function standingsRows(L){
  const T={};
  ALL.forEach(m=>{if(m.knock||m.group!==L)return;
    [m.home,m.away].forEach(t=>{if(!T[t])T[t]={team:t,p:0,gf:0,ga:0,pts:0};});
    const r=resultFor(m,live);
    if(r&&r.st==="FT"){const H=T[m.home],A=T[m.away];H.p++;A.p++;H.gf+=r.hs;H.ga+=r.as;A.gf+=r.as;A.ga+=r.hs;if(r.hs>r.as)H.pts+=3;else if(r.hs<r.as)A.pts+=3;else{H.pts++;A.pts++;}}
  });
  return Object.values(T).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf||a.team.localeCompare(b.team));
}

function bestThirds(){
  const allGroupsDone="ABCDEFGHIJKL".split("").every(groupComplete);
  if(!allGroupsDone)return null;
  const thirds="ABCDEFGHIJKL".split("").map(L=>{const r=standingsRows(L)[2];return r?{...r,group:L}:null;}).filter(Boolean);
  thirds.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf||a.team.localeCompare(b.team));
  return thirds.slice(0,8);
}

  if(/^3rd/.test(tok))return null; // assigned via feed or manual
  if(x=/^W(\d+)$/.exec(tok))return koWinnerTeam("M"+x[1]);
  if(x=/^L(\d+)$/.exec(tok))return koLoserTeam("M"+x[1]);
  return null;
}
function koResolved(code){
  const o=koOverride[code];if(o&&o.h&&o.a)return{h:o.h,a:o.a};
  const e=KO_BY_CODE[code];if(!e)return{h:null,a:null};

}
function koSide(code){
  const res=koResolved(code);

      .sort((a,b)=>a.m.iso-b.m.iso);
    if(cand.length)picks.set(cand[0].m.idx,cand[0].m);
  });
  return [...picks.values()].sort((a,b)=>{const la=isLiveM(a)?0:1,lb=isLiveM(b)?0:1;return la-lb||a.iso-b.iso;});
}

/* ---------- live fetch via free CORS API (best effort) ---------- */
const TSDB="https://www.thesportsdb.com/api/v1/json/123";
const WC_LEAGUE_ID="4429"; // FIFA World Cup on TheSportsDB
async function getJSON(url){const r=await fetch(url,{cache:"no-store"});if(!r.ok)throw new Error("net");return r.json();}
async function fetchWCEvents(){
  let evs=[];
  // 1) League-specific: full season (all 104 games incl. scores) + recent + next
  try{const j=await getJSON(`${TSDB}/eventsseason.php?id=${WC_LEAGUE_ID}&s=2026`);if(j.events)evs=evs.concat(j.events);}catch(e){}
  try{const j=await getJSON(`${TSDB}/eventspastleague.php?id=${WC_LEAGUE_ID}`);if(j.events)evs=evs.concat(j.events);}catch(e){}
  try{const j=await getJSON(`${TSDB}/eventsnextleague.php?id=${WC_LEAGUE_ID}`);if(j.events)evs=evs.concat(j.events);}catch(e){}
  // 2) Fallback: generic by-day soccer query around now
  if(!evs.length){
    const now=Date.now(),isoDay=ms=>new Date(ms).toISOString().slice(0,10);
    for(const d of [isoDay(now+864e5),isoDay(now),isoDay(now-864e5)]){
      try{const es=await getJSON(`${TSDB}/eventsday.php?d=${d}&s=Soccer`);if(es.events)evs=evs.concat(es.events);}catch(e){}
    }
  }
  // de-dupe by event id
  const seen=new Set();
  return evs.filter(e=>{if(!e||!e.idEvent||seen.has(e.idEvent))return false;seen.add(e.idEvent);return true;});
}
function mapStatus(e){
  const s=(e.strStatus||"").toLowerCase(),p=(e.strProgress||"").toLowerCase();
  if(/finish|^ft$|aet|pen|after/.test(s))return"FT";
  if(/half|^ht$/.test(s)||p==="ht")return"HT";
  if(/1h|2h|live|et|in.?play|playing/.test(s)||/\d/.test(p))return"LIVE";
  return"NS";
}
async function fetchLive(){
  if(state.loading)return; state.loading=true; render();
  try{
    const evs=await fetchWCEvents();
    const wc=evs.filter(e=>e&&/world cup/i.test(e.strLeague||"")&&e.strHomeTeam&&e.strAwayTeam);
    const arr=[];
    wc.forEach(e=>{
      const st=mapStatus(e);
      if(st==="NS")return;
      if(e.intHomeScore==null||e.intAwayScore==null||e.intHomeScore==="")return;
      arr.push({h:e.strHomeTeam,a:e.strAwayTeam,hs:e.intHomeScore,as:e.intAwayScore,st,min:e.strProgress||"",d:e.dateEvent,venue:e.strVenue||"",city:e.strCity||""});
    });
    if(arr.length){
      live=mergeResults(live,arr);saveLive();
      resolveKOFromFeed(arr); // best-effort: fill future knockout matchups from the feed
    }
    state.updated=Date.now();saveUpd(state.updated);
    state.apiMsg=arr.length?null:(state.updated?"online-empty":null);
  }catch(e){
    state.apiMsg="offline";
  }finally{
    state.loading=false; render();
  }
}
function normVenue(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/stadium|estadio|field|arena|park/g,"").replace(/[^a-z]/g,"");}
function resolveKOFromFeed(arr){
  let changed=false;
  const koMatches=ALL.filter(m=>m.knock);
  arr.forEach(e=>{
    if(!e.d)return;
    const eMid=Date.parse(e.d+"T12:00:00Z");if(isNaN(eMid))return;
    const cand=koMatches.filter(m=>{
      if(koOverride[m.tag])return false; // never clobber existing (seeded/manual/prior)
      if(Math.abs(m.iso-eMid)>36*3.6e6)return false; // within ±36h
      const v=normVenue(e.venue),mv=normVenue(m.venue),c=(e.city||"").toLowerCase();
      return (v&&mv&&(v.includes(mv)||mv.includes(v)))||(c&&m.city.toLowerCase().includes(c));
    });
    if(cand.length===1){
      const m=cand[0];
      const cur=koResolved(m.tag);
      if(!(cur.h&&cur.a)){
        koOverride[m.tag]={h:e.h,a:e.a};
        const st=mapStatus(e);
        if(st==="FT"&&e.hs!==e.as)koWin[m.tag]=+e.hs>+e.as?"h":"a";
        changed=true;
      }
    }
  });
  if(changed){saveKO();saveKOWin();}
}

      <div class="advlbl">Who advances?</div>
      <div class="advsel">
        <button data-adv="h" class="${state.editAdv==="h"?"on":""}">${esc(state.editKOH||"Home")}</button>
        <button data-adv="a" class="${state.editAdv==="a"?"on":""}">${esc(state.editKOA||"Away")}</button>
      </div>
      <div class="sheet-actions">
        <button class="btn-cancel" data-act="cancel">Cancel</button>
        <button class="btn-clear" data-act="koclear">Reset</button>
        <button class="btn-save" data-act="kosave">Save</button>
      </div>`;
    return;
  }
  document.getElementById("sheet").innerHTML=`
    <h3>Set Result</h3>
    <div class="sub">Grp ${m.group} · ${esc(m.dateLabel)} · ${esc(m.city)}</div>
    <div class="scorer">
      <div class="side"><div class="nm">${esc(m.home)}</div><div class="stepper"><button data-step="h-">–</button><span class="val">${state.editH}</span><button data-step="h+">+</button></div></div>
      <div class="x">–</div>
      <div class="side"><div class="nm">${esc(m.away)}</div><div class="stepper"><button data-step="a-">–</button><span class="val">${state.editA}</span><button data-step="a+">+</button></div></div>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" data-act="cancel">Cancel</button>
      <button class="btn-clear" data-act="clear">Clear</button>
      <button class="btn-save" data-act="save">Save</button>
    </div>`;
}
function closeEditor(){document.getElementById("overlay").classList.remove("show");state.editIdx=null;}

/* ---------- events ---------- */
document.addEventListener("click",e=>{
  const jump=e.target.closest("[data-jump]");
  if(jump){state.tab="live";state._scrollLive=true;render();return;}
  const tabBtn=e.target.closest(".tab");
  if(tabBtn){state.tab=tabBtn.dataset.tab;if(tabBtn.dataset.tab==="live")state._scrollLive=true;render();return;}
  const toggle=e.target.closest("[data-toggle]");
  if(toggle){state[toggle.dataset.toggle]=!state[toggle.dataset.toggle];state._keepScroll=true;render();return;}
  const refresh=e.target.closest("#refresh");
  if(refresh){fetchLive();return;}
  const unfollow=e.target.closest("[data-unfollow]");
  if(unfollow){toggleFollow(unfollow.dataset.unfollow);state._keepScroll=true;render();return;}
  const clearf=e.target.closest("[data-clearfollow]");
  if(clearf){follow.clear();saveFollow();state._keepScroll=true;render();return;}
  const followEl=e.target.closest("[data-follow]");
  if(followEl){toggleFollow(followEl.dataset.follow);state._keepScroll=true;render();return;}
  // modal buttons
  const step=e.target.closest("[data-step]");
  if(step){const s=step.dataset.step;if(s==="h+")state.editH++;if(s==="h-")state.editH=Math.max(0,state.editH-1);if(s==="a+")state.editA++;if(s==="a-")state.editA=Math.max(0,state.editA-1);renderSheet();return;}
  const adv=e.target.closest("[data-adv]");
  if(adv){state.editAdv=adv.dataset.adv;renderSheet();return;}
  const act=e.target.closest("[data-act]");
  if(act){
    const m=ALL[state.editIdx];const A=act.dataset.act;
    if(A==="save"){live=mergeResults(live,[{h:m.home,a:m.away,hs:state.editH,as:state.editA,st:"FT"}],{manual:true,force:true});saveLive();}
    else if(A==="clear"){delete live[pairKey(m.home,m.away)];saveLive();}
    else if(A==="kosave"){
      const h=(state.editKOH||"").trim(),a=(state.editKOA||"").trim();
      if(h&&a){
        koOverride[m.tag]={h,a};
        live=mergeResults(live,[{h,a,hs:state.editH,as:state.editA,st:"FT"}],{manual:true,force:true});
        koWin[m.tag]=state.editAdv||(state.editH>state.editA?"h":state.editH<state.editA?"a":"h");
        saveKO();saveKOWin();saveLive();
      }
    }
    else if(A==="koclear"){
      if(koOverride[m.tag]){delete live[pairKey(koOverride[m.tag].h,koOverride[m.tag].a)];}
      const dm=dispMatch(m);if(dm.home&&dm.away)delete live[pairKey(dm.home,dm.away)];
      delete koOverride[m.tag];delete koWin[m.tag];saveKO();saveKOWin();saveLive();
    }
    closeEditor();render();return;
  }
  if(e.target.id==="overlay"){closeEditor();return;}
  const bk=e.target.closest(".bk-match");
  if(bk){openEditor(+bk.dataset.idx);return;}
  const card=e.target.closest(".card.editable");
  if(card){openEditor(+card.dataset.idx);return;}
});
document.addEventListener("input",e=>{
  if(e.target.id==="fSearch"){state.fSearch=e.target.value;const pos=e.target.selectionStart;render();const inp=document.getElementById("fSearch");if(inp){inp.focus();inp.setSelectionRange(pos,pos);}}
  else if(e.target.id==="tSearch"){state.tSearch=e.target.value;state._keepScroll=true;state._focusT=true;render();}
  else if(e.target.id==="ko-h"){state.editKOH=e.target.value;}
  else if(e.target.id==="ko-a"){state.editKOA=e.target.value;}
});
document.addEventListener("change",e=>{
  if(e.target.id==="fGroup"){state.fGroup=e.target.value;render();}
});

/* ---------- boot ---------- */
seedKnockout();
document.getElementById("subtz").textContent=`Canada · Mexico · USA — all times ${TZ_ABBR}`;
state._scrollLive=true;
render();
fetchLive();
setInterval(()=>{if(!document.hidden&&navigator.onLine)fetchLive();},75000);
window.addEventListener("online",()=>fetchLive());

/* ---------- service worker ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(()=>{});});
}
</script>
</body>
</html>
